name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v1.2.3). Builds from the commit at this tag and creates a GitHub Release with the same name.'
        required: true
        type: string

permissions: {}

env:
  CARGO_TERM_COLOR: always
  RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref_name }}

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            use_cross: false
          - target: x86_64-unknown-linux-musl
            runner: ubuntu-latest
            use_cross: false
            musl: true
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-latest
            use_cross: true
          - target: aarch64-apple-darwin
            runner: macos-latest
            use_cross: false

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref }}

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install musl-tools
        if: matrix.musl
        run: sudo apt-get install -y musl-tools

      - name: Install cross
        if: matrix.use_cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build (native)
        if: "!matrix.use_cross"
        run: cargo build --release --target ${{ matrix.target }}

      - name: Build (cross)
        if: matrix.use_cross
        run: cross build --release --target ${{ matrix.target }}

      - name: Create archive
        shell: bash
        env:
          TAG: ${{ env.RELEASE_TAG }}
          TARGET: ${{ matrix.target }}
        run: |
          ARCHIVE="secretenv-${TAG}-${TARGET}.tar.gz"
          cp "target/${TARGET}/release/secretenv" ./secretenv
          tar czf "${ARCHIVE}" secretenv LICENSE NOTICE
          echo "ARCHIVE=${ARCHIVE}" >> "$GITHUB_ENV"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: secretenv-${{ matrix.target }}
          path: ${{ env.ARCHIVE }}

  release:
    name: Publish Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate SHA256SUMS
        run: |
          cd artifacts
          sha256sum secretenv-*.tar.gz > SHA256SUMS
          cat SHA256SUMS

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          files: |
            artifacts/secretenv-*.tar.gz
            artifacts/SHA256SUMS
          generate_release_notes: true

  update-homebrew-tap:
    name: Update Homebrew Tap
    needs: release
    runs-on: ubuntu-latest
    permissions: {}
    env:
      TAG: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref_name }}
    steps:
      - name: Download SHA256SUMS
        run: |
          sleep 10
          curl -fsSL \
            "https://github.com/ebisawa/secretenv/releases/download/${TAG}/SHA256SUMS" \
            -o SHA256SUMS
          cat SHA256SUMS

      - name: Extract hashes
        run: |
          SHA256_LINUX_X86="$(grep "x86_64-unknown-linux-gnu" SHA256SUMS | awk '{print $1}')"
          SHA256_LINUX_ARM="$(grep "aarch64-unknown-linux-gnu" SHA256SUMS | awk '{print $1}')"
          SHA256_MACOS_ARM="$(grep "aarch64-apple-darwin" SHA256SUMS | awk '{print $1}')"
          echo "SHA256_LINUX_X86=${SHA256_LINUX_X86}" >> "$GITHUB_ENV"
          echo "SHA256_LINUX_ARM=${SHA256_LINUX_ARM}" >> "$GITHUB_ENV"
          echo "SHA256_MACOS_ARM=${SHA256_MACOS_ARM}" >> "$GITHUB_ENV"

      - name: Update Formula
        uses: actions/github-script@v8
        env:
          TAG: ${{ env.RELEASE_TAG }}
          SHA256_LINUX_X86: ${{ env.SHA256_LINUX_X86 }}
          SHA256_LINUX_ARM: ${{ env.SHA256_LINUX_ARM }}
          SHA256_MACOS_ARM: ${{ env.SHA256_MACOS_ARM }}
        with:
          github-token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          script: |
            const tag = process.env.TAG;
            const ver = tag.replace(/^v/, '');
            const base = `https://github.com/ebisawa/secretenv/releases/download/${tag}`;

            const formula = `# typed: false
            # frozen_string_literal: true

            class Secretenv < Formula
              desc "Serverless CLI for secure secret sharing with HPKE encryption"
              homepage "https://github.com/ebisawa/secretenv"
              version "${ver}"
              license "Apache-2.0"

              on_macos do
                on_arm do
                  url "${base}/secretenv-${tag}-aarch64-apple-darwin.tar.gz"
                  sha256 "${process.env.SHA256_MACOS_ARM}"
                end
              end

              on_linux do
                on_intel do
                  url "${base}/secretenv-${tag}-x86_64-unknown-linux-gnu.tar.gz"
                  sha256 "${process.env.SHA256_LINUX_X86}"
                end
                on_arm do
                  url "${base}/secretenv-${tag}-aarch64-unknown-linux-gnu.tar.gz"
                  sha256 "${process.env.SHA256_LINUX_ARM}"
                end
              end

              def install
                bin.install "secretenv"
              end

              test do
                assert_match version.to_s, shell_output("#{bin}/secretenv --version")
              end
            end
            `;

            const { data: file } = await github.rest.repos.getContent({
              owner: "ebisawa",
              repo: "homebrew-secretenv",
              path: "Formula/secretenv.rb",
            }).catch(() => ({ data: null }));

            await github.rest.repos.createOrUpdateFileContents({
              owner: "ebisawa",
              repo: "homebrew-secretenv",
              path: "Formula/secretenv.rb",
              message: `Update secretenv to ${tag}`,
              content: Buffer.from(formula).toString("base64"),
              sha: file?.sha,
            });
